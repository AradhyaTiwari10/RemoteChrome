version: '3.8'

services:
  # BrowserPilot Backend Orchestrator
  backend:
    container_name: browserpilot-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - browserpilot-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # BrowserPilot Frontend Dashboard
  frontend:
    container_name: browserpilot-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5001
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:5001
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - browserpilot-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  browserpilot-net:
    name: browserpilot-net
    driver: bridge
